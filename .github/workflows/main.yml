name: All Builds (Linux, macOS, Windows, Android, IPA, APK, AAB)

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.41.4
  FLET_FORCE_ANSWER: "yes"

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build Linux
        run: |
          flutter config --no-analytics
          flet build linux --non-interactive --verbose --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build Windows
        run: |
          flutter config --no-analytics
          flet build windows --non-interactive --verbose --build-number=$env:BUILD_NUMBER --build-version=$env:BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows


  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build macOS
        run: |
          flutter config --no-analytics
          flet build macos --non-interactive --verbose --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos


  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build APK
        run: |
          flutter config --no-analytics
          flet build apk --non-interactive --verbose --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: build/apk


  build-aab:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build AAB
        run: |
          flutter config --no-analytics
          flet build aab --non-interactive --verbose --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: build/aab


  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build IPA
        run: |
          flutter config --no-analytics
          flet build ipa --non-interactive --verbose --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: build/ipa
